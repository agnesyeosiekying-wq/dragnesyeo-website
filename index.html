<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr Agnes Yeo | Consultant Plastic Surgeon</title>
    
    <meta name="description" content="Dr. Agnes Yeo is a Consultant Plastic Surgeon at Bukit Tinggi Medical Centre, specializing in natural aesthetic results and reconstructive surgery.">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #F4F7FA;
            color: #333;
            line-height: 1.6;
        }

        /* ✅ HEADER (UPDATED) */
        header {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #0F203C;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ✅ SVG LOGO */
        .logo img { 
            height: 80px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        /* ✅ NAV WHITE */
        nav a {
            margin-left: 24px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        nav a:hover {
            color: #8EACCD;
        }

        /* ✅ HERO UPDATED */
        .hero {
            position: relative;
            height: 85vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(15,32,60,0.9),
                rgba(15,32,60,0.7),
                rgba(15,32,60,0.3)
            );
        }

        /* ✅ LEFT + GLASS EFFECT */
        .hero-text {
            position: relative;
            margin-left: 8%;
            max-width: 480px;
            padding: 40px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(6px);
            background: rgba(255,255,255,0.05);
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 56px);
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: clamp(16px, 2vw, 20px);
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* KEEP ORIGINAL BUTTON STYLE */
        .button {
            display: inline-block;
            padding: 14px 32px;
            background: white;
            color: #2F4F6F;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        /* ===== REST UNCHANGED ===== */

        .section {
            max-width: 1100px;
            margin: auto;
            padding: 80px 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 25px;
            color: #2F4F6F;
        }

        .trust-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .trust-item {
            background: #EAF1F5;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .service-box {
            background: #F8FAFC;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #EAF1F5;
        }

        .doctor-card {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .doctor-image img {
            width: 300px;
            border-radius: 15px;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 14px;
            color: #777;
        }

        @media (max-width: 768px) {
            header { padding: 10px 20px; }
            .logo img { height: 60px; }
            nav a { margin-left: 12px; font-size: 12px; }

            .hero { height: 70vh; }

            .hero-text {
                margin: 20px;
                padding: 20px;
            }

            .doctor-card {
                flex-direction: column;
                text-align: center;
            }

            .doctor-image img {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <!-- ✅ SVG LOGO -->
        <img src="IMG_3288.svg" alt="Dr Agnes Yeo Logo">
    </div>

    <nav>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <img class="hero-bg" src="https://raw.githubusercontent.com/agnesyeosiekying-wq/dragnesyeo-website/main/hero.png">
    <div class="hero-overlay"></div>

    <div class="hero-text">
        <h1>Enhancing Natural Beauty.<br>Not Changing Who You Are.</h1>
        <p>Personalized aesthetic and reconstructive care focused on harmony and natural-looking results.</p>
        <a class="button" href="https://wa.me/60189657735">WhatsApp Consultation</a>
    </div>
</section>

</body>
</html>
